<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tweet & Caption Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080d1a;
      min-height: 100vh;
      font-family: 'DM Serif Display', serif;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(79,156,249,0.08) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    h1 {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 56px 24px 40px;
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      font-style: italic;
      color: #c8dffe;
      letter-spacing: -0.01em;
      font-weight: 400;
    }

    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 0 6px 6px;
    }

    .card {
      aspect-ratio: 4/3;
      overflow: hidden;
      cursor: pointer;
      background: #111827;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.3s;
      opacity: 0.88;
    }

    .card:hover img {
      transform: scale(1.06);
      opacity: 1;
    }

    /* Lightbox */
    #lb {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(4,7,18,0.95);
      backdrop-filter: blur(24px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    #lb.on { opacity: 1; pointer-events: all; }

    #lb img {
      max-width: 88vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 6px;
      transform: scale(0.95);
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
    }

    #lb.on img { transform: scale(1); }

    .lb-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #c8dffe;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .lb-btn:hover { background: rgba(79,156,249,0.2); }
    .lb-prev { left: 20px; }
    .lb-next { right: 20px; }

    .lb-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #c8dffe;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .lb-close:hover { background: rgba(255,255,255,0.12); }

    @media (max-width: 900px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>

<h1>Tweet &amp; Caption Generator</h1>

<div class="grid">
  <div class="card" onclick="open(10)"><img src="/ui ss8.PNG" alt="" loading="lazy" /></div>
  <div class="card" onclick="open(11)"><img src="/ui ss9.PNG" alt="" loading="lazy" /></div>
</div>

<div id="lb">
  <button class="lb-close" onclick="close()">✕</button>
  <button class="lb-btn lb-prev" onclick="nav(-1)">‹</button>
  <img id="lb-img" src="" alt="" />
  <button class="lb-btn lb-next" onclick="nav(1)">›</button>
</div>

<script>
  const imgs = [
    "/ui ss homepage1.PNG","/ui ss homepage2.PNG","/ui ss homepage3.PNG",
    "/ui ss1.PNG","/ui ss2.PNG","/ui ss3.PNG","/ui ss4.PNG",
    "/ui ss5.PNG","/ui ss6.PNG","/ui ss7.PNG","/ui ss8.PNG","/ui ss9.PNG",
  ];
  let cur = 0;
  const lb = document.getElementById('lb');
  const lbImg = document.getElementById('lb-img');

  function open(i) { cur = i; lbImg.src = imgs[cur]; lb.classList.add('on'); }
  function close() { lb.classList.remove('on'); }
  function nav(d) { cur = (cur + d + imgs.length) % imgs.length; lbImg.src = imgs[cur]; }

  lb.addEventListener('click', e => { if (e.target === lb) close(); });
  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('on')) return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') nav(-1);
    if (e.key === 'ArrowRight') nav(1);
  });
</script>
</body>
</html>
